<!DOCTYPE html>
<html>
<head>
    <title>Receiver</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            width: 420px;
            text-align: center;
        }

        .box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            background: #f1f1f1;
            word-break: break-all;
        }

        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>📩 Received Secure Message</h2>

    <!-- ✅ IMPORTANT -->
    <div id="msgBox" class="box">
        Waiting for message...
    </div>

    <h3>📤 Send Response</h3>

    <textarea id="responseText" placeholder="Enter response"></textarea>

    <button onclick="sendResponse()">Send Response</button>

    <div id="status"></div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
