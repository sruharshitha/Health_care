<!DOCTYPE html>
<html>
<head>
    <title>Receiver</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            width: 450px;
            text-align: center;
        }

        .box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            min-height: 80px;
        }

        .accepted {
            background: #e8f5e9;
            border-left: 5px solid green;
        }

        .rejected {
            background: #ffebee;
            border-left: 5px solid red;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        #status {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>📥 Received Secure Message</h2>

    <!-- MESSAGE BOX -->
    <div id="msgBox" class="box">
        ⏳ Waiting for message...
    </div>

    <hr style="margin:20px 0;">

    <!-- RESPONSE -->
    <h3>📤 Send Response</h3>

    <textarea id="responseText" placeholder="Enter response"></textarea>

    <button onclick="sendResponse()">Send Response</button>

    <div id="status"></div>

</div>

<!-- JS -->
<script src="/static/app.js"></script>

</body>
</html>
