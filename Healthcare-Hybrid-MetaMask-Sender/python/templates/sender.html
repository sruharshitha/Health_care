<!DOCTYPE html>
<html>
<head>
    <title>Sender</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            width: 420px;
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        textarea {
            height: 100px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            word-break: break-all;   /* ✅ FIX CID overflow */
        }

        .success {
            background: #e8f5e9;
            border-left: 5px solid green;
        }

        .error {
            background: #ffebee;
            border-left: 5px solid red;
        }

        .response-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #e3f2fd;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Send Secure Message</h2>

    <input type="text" id="patient_id" placeholder="Enter Patient ID">

    <textarea id="message" placeholder="Enter message"></textarea>

    <button onclick="sendMessage()">Send Message</button>

    <div id="result"></div>

    <h3>📩 Response</h3>

    <div id="responseBox" class="response-box">
        Waiting...
    </div>

    <!-- ✅ FIXED BUTTON -->
    <button onclick="checkResponse()">Check Response</button>

</div>

<script src="/static/app.js"></script>

</body>
</html>
